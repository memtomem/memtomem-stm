name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Until memtomem is published to PyPI, STM resolves it from a sibling
# checkout via [tool.uv.sources] path = "../memtomem/packages/memtomem".
# Each job below checks out memtomem and memtomem-stm side by side and
# runs from the memtomem-stm working directory so the path resolves.

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memtomem-stm
    steps:
      - uses: actions/checkout@v4
        with:
          repository: memtomem/memtomem
          path: memtomem
      - uses: actions/checkout@v4
        with:
          path: memtomem-stm
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run ruff check src
      - run: uv run ruff format --check src

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memtomem-stm
    steps:
      - uses: actions/checkout@v4
        with:
          repository: memtomem/memtomem
          path: memtomem
      - uses: actions/checkout@v4
        with:
          path: memtomem-stm
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - name: mypy (gradual)
        run: uv run mypy src
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memtomem-stm
    steps:
      - uses: actions/checkout@v4
        with:
          repository: memtomem/memtomem
          path: memtomem
      - uses: actions/checkout@v4
        with:
          path: memtomem-stm
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest -m "not ollama" --tb=short -q
